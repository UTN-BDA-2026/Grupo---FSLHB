services:
  traefik:
    image: traefik:v3.1
    ports:
      - "8444:443"
    volumes:
      - ./app/traefik/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./app/traefik/config/config.yml:/etc/traefik/config.yml:ro
      - ./app/traefik/certs:/etc/certs:ro
    restart: always
    # Configuración por archivo traefik.yml/config.yml y certificados mkcert

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpass
      MONGO_INITDB_DATABASE: hockey
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_DATABASE: hockey
      MARIADB_USER: hockeyuser
      MARIADB_PASSWORD: hockeypass
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mariadbdata:/var/lib/mysql

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: hockey
      POSTGRES_USER: hockeyuser
      POSTGRES_PASSWORD: hockeypass
    ports:
      - "5433:5432"
    volumes:
      - postgresdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - mongodb
      - mariadb
      - db
      - traefik
    environment:
      FLASK_ENV: production
      # Local: permitir HTTP directo en :5000 (sin redirección a https://localhost:5000)
      FORCE_HTTPS: "true"
      # Local: permitir sesión/login por HTTP (cookies no-secure)
      SESSION_COOKIE_SECURE: "true"
      MONGO_URI: mongodb://admin:adminpass@mongodb:27017/hockey?authSource=admin
      DATABASE_URL: mysql+pymysql://hockeyuser:hockeypass@mariadb:3306/hockey
      FLASK_APP: app
      FLASK_DEBUG: "0"
      SECRET_KEY: "HockeyAccionProdSecret2025!"
      CORS_ORIGINS: "https://hockeyaccionsanrafael.com,https://www.hockeyaccionsanrafael.com"
      ENABLE_CSRF: "true"
      # Cloudinary: definir en .env o sustituir directamente; formato:
      # cloudinary://<API_KEY>:<API_SECRET>@<CLOUD_NAME>
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    # El puerto ya no se expone directamente, lo maneja Traefik.
    # El comando de arranque por defecto se define en el Dockerfile (Gunicorn).
    volumes:
      - .:/app
    # Traefik ahora se configura solo por archivo (config.yml), no por labels.

volumes:
  mongodata:
  mariadbdata:
  postgresdata: