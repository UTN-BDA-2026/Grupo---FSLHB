services:
  traefik:
    image: traefik:v3.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app/traefik/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./app/traefik/config/config.yml:/etc/traefik/config.yml:ro
      - ./app/traefik/certs:/etc/certs:ro
      - traefik_acme:/acme
    restart: always
    # Configuración por archivo traefik.yml/config.yml y certificados mkcert
    labels:
      - "traefik.enable=true"
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: hockey
      POSTGRES_USER: hockeyuser
      POSTGRES_PASSWORD: hockeypass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # usa 5433 en el host para evitar conflicto si 5432 ya está ocupado

  app:
    build: .
    depends_on:
      - db
      - traefik
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      # Local: permitir HTTP directo en :5000 (sin redirección a https://localhost:5000)
      FORCE_HTTPS: "false"
      # Local: permitir sesión/login por HTTP (cookies no-secure)
      SESSION_COOKIE_SECURE: "false"
      DATABASE_URL: postgresql://hockeyuser:hockeypass@db:5432/hockey
      PROD_DATABASE_URI: postgresql://hockeyuser:hockeypass@db:5432/hockey
      FLASK_APP: app
      FLASK_DEBUG: "0"
      HOST: 0.0.0.0
      PORT: 5000
      SECRET_KEY: "HockeyAccionProdSecret2025!"
      CORS_ORIGINS: "https://hockeyaccionsanrafael.com,https://www.hockeyaccionsanrafael.com"
      ENABLE_CSRF: "true"
      # Cloudinary: definir en .env o sustituir directamente; formato:
      # cloudinary://<API_KEY>:<API_SECRET>@<CLOUD_NAME>
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    # El puerto ya no se expone directamente, lo maneja Traefik.
    # El comando de arranque por defecto se define en el Dockerfile (Gunicorn).
    volumes:
      - .:/app
    # Traefik ahora se configura solo por archivo (config.yml), no por labels.

volumes:
  pgdata:
  traefik_acme:

