                <span style="font-size:1.5rem;font-weight:bold;line-height:1.1;">Hockey Acción</span>
                <span style="font-size:1.5rem;font-weight:bold;line-height:1.1;">San Rafael</span>

    <main>
        <section style="max-width: 600px; margin: 2.5rem auto 0 auto; background: #f8fafc; border-radius: 12px; box-shadow: 0 2px 12px #0001; padding: 2.2rem 2rem 2.5rem 2rem;">

            <div style="display:flex; flex-direction:column; gap:1.2rem;">
                <a href="{{ url_for('static', filename='reglamento/REGLAMENTO CLAUSURA  2025.pdf') }}" download style="display:flex;align-items:center;gap:12px;padding:1.1rem 1.2rem;background:#fff;border-radius:8px;text-decoration:none;box-shadow:0 1px 4px #0001;transition:box-shadow .2s; font-size:1.15rem; color:#1a4d7a; font-weight:500;">
                    <i class="fas fa-file-pdf" style="font-size:1.5rem;color:#e63946;"></i>

                </a>

    <script src="{{ url_for('static', filename='js/responsive.js') }}"></script>
    <script>
    // Mostrar la fecha actual en la barra superior
    const fechaHoy = document.getElementById('fecha-hoy');
    if (fechaHoy) {
        const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        const hoy = new Date();
        fechaHoy.textContent = `${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
    }
    </script>
</body>
