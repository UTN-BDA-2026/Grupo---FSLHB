<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingreso Clubes - Hockey Acción San Rafael</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">

    <!-- JS (defer para que cargue después del DOM) -->
    <!-- CSRF helper debe cargarse antes que login.js para parchear fetch -->
    <script src="{{ url_for('static', filename='js/csrf.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/login.js') }}" defer></script>

    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body class="login-bg">
    <!-- Barra superior -->
    <div class="top-bar">
        <span id="fecha-hoy"></span>
        <span class="topbar-divider"></span>
        <a href="/" class="volver-inicio" title="Volver al inicio">
            <i class="fas fa-home"></i>
        </a>
        <span class="topbar-divider"></span>
        <a href="#" class="clubes-login">
            <i class="fas fa-lock"></i> Ingreso clubes
        </a>
    </div>

    <!-- Contenido principal -->
    <main>
        <div class="login-card">
            <img src="{{ url_for('static', filename='assets/img/logo-asociacion.png') }}" alt="Logo Hockey Acción San Rafael" style="width:130px;max-width:48vw;margin-bottom:1.3rem;display:block;">
            
            <h2 style="font-size:1.65rem;line-height:1.18;margin-bottom:1.1rem;">
                Hockey Acción San Rafael
            </h2>

            <form id="login-form" class="login-form" autocomplete="on">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required autocomplete="username" />

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" />

                <div class="login-error" id="login-error" style="display: none;">
                    Usuario o contraseña incorrectos
                </div>

                <input type="submit" value="Ingresar" />
            </form>
            <!-- La lógica de login está en static/js/login.js -->
        </div>
    </main>
</body>
</html>
